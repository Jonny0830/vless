  - IR-ENTRY-04
  - IR-ENTRY-05
  - IR-ENTRY-06
  - IR-ENTRY-07
  - IR-ENTRY-08
- name: 🇮🇷 AUTO-IR-ENTRY
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 180
  tolerance: 50
  timeout: 5000
  max-failed-times: 3
  proxies:
  - IR-ENTRY-01
  - IR-ENTRY-02
  - IR-ENTRY-03
  - IR-ENTRY-04
  - IR-ENTRY-05
  - IR-ENTRY-06
  - IR-ENTRY-07
  - IR-ENTRY-08
- name: 🇸🇪 AUTO-SW-DIALER
